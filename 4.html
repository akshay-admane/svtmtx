<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AppSync Mutation Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">
<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold mb-4">JSON → AWS AppSync Mutation Generator</h1>

<!-- GLOBAL CONFIG -->
<div class="bg-white p-4 rounded-xl shadow mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
  <div>
    <label class="block text-sm font-medium mb-1">Primary Company ID</label>
    <input id="pcIdInput" class="border p-2 rounded w-full" placeholder="01XXXXXXXXXXXX" />
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Upload JSON</label>
    <input type="file" id="fileInput" accept="application/json" class="border p-2 rounded w-full" />
  </div>
</div>

<!-- GLOBAL CHECKBOX TREE -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
  <h2 class="font-semibold mb-3">Global Field Configuration</h2>
  <div id="globalCheckboxTree"></div>
</div>

<!-- Tabs -->
<div id="tabs" class="flex flex-wrap gap-2 mb-4"></div>

<!-- Asset Type Config -->
<div id="assetTypeConfig" class="bg-white p-4 rounded-xl shadow mb-4 hidden"></div>

<!-- Content -->
<div id="content" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>

</div>

<script>

let assetData = {};
let currentAssetType = null;

let globalSelection = {

  templateFields:{
    measurementFrequency:true,
    isAnnualCompliance:true,
    isPeriodicCompliance:true,
    isAssetConfigured:true,
    targetPeriod:true,
    delinquencyPeriod:true
  },

  measurementFields:{
    compliance:true,
    viewInMainGrid:true,
    measurementSource:true,
    measurementType:true,
    unit:true,
    onOffValue:true,
    acDcValue:true,
    measurementOrder:true
  },

  inspectionFields:{
    annualInspection:false,
    periodicInspection:false,
    supplementalInspection:false,
    exceptionLogic:false
  }
};

const globalCheckboxTree = document.getElementById('globalCheckboxTree');
const fileInput = document.getElementById('fileInput');
const tabsContainer = document.getElementById('tabs');
const contentContainer = document.getElementById('content');
const pcIdInput = document.getElementById('pcIdInput');
const assetTypeConfig = document.getElementById('assetTypeConfig');


// ---------------- GLOBAL CHECKBOX TREE ----------------

function renderGlobalCheckboxTree(){

  globalCheckboxTree.innerHTML='';

  globalCheckboxTree.appendChild(
    createCheckbox("SELECT ALL", true,(checked)=>{
      Object.values(globalSelection).forEach(group=>{
        Object.keys(group).forEach(k=>group[k]=checked);
      });
      renderGlobalCheckboxTree();
    })
  );

  globalCheckboxTree.appendChild(createGroup("Template Fields",globalSelection.templateFields));
  globalCheckboxTree.appendChild(createGroup("Measurement Object Fields",globalSelection.measurementFields));
  globalCheckboxTree.appendChild(createGroup("Inspection / Exception Fields",globalSelection.inspectionFields));
}

function createGroup(title,obj){
  const wrapper=document.createElement('div');
  wrapper.className="ml-4 mt-2";

  const heading=document.createElement('div');
  heading.className="font-medium";
  heading.innerText=title;

  wrapper.appendChild(heading);

  Object.keys(obj).forEach(field=>{
    wrapper.appendChild(
      createCheckbox(field,obj[field],(checked)=>{
        obj[field]=checked;
      })
    );
  });

  return wrapper;
}

renderGlobalCheckboxTree();


// ---------------- FILE LOAD ----------------

fileInput.addEventListener('change', async(e)=>{
  const file=e.target.files[0];
  if(!file) return;

  const text=await file.text();
  const json=JSON.parse(text);

  const items=json?.data?.getAssetTypeTemplateByPrimaryCompanyId?.items || [];
  assetData={};

  items.forEach(asset=>{
    const typeName=asset.assetType;

    if(!assetData[typeName]){
      assetData[typeName]={
        assetTypeId:asset.id || '',
        templates:[]
      };
    }

    (asset.assetTypeTemplates || []).forEach(template=>{
      assetData[typeName].templates.push(template);
    });
  });

  renderTabs();
});


// ---------------- TABS ----------------

function renderTabs(){
  tabsContainer.innerHTML='';
  contentContainer.innerHTML='';

  Object.keys(assetData).forEach((type,index)=>{
    const btn=document.createElement('button');
    btn.className=`px-3 py-1 rounded-lg text-sm font-medium ${index===0?'bg-blue-600 text-white':'bg-white border'}`;
    btn.innerText=type;
    btn.onclick=()=>selectTab(type,btn);
    tabsContainer.appendChild(btn);

    if(index===0) selectTab(type,btn);
  });
}

function selectTab(type,button){
  currentAssetType=type;

  [...tabsContainer.children].forEach(b=>b.className='px-3 py-1 rounded-lg text-sm font-medium bg-white border');
  button.className='px-3 py-1 rounded-lg text-sm font-medium bg-blue-600 text-white';

  renderAssetTypeConfig(type);
  renderTemplates(type);
}


// ---------------- ASSET TYPE CONFIG ----------------

function renderAssetTypeConfig(type){
  assetTypeConfig.classList.remove('hidden');
  assetTypeConfig.innerHTML='';

  const assetTypeId=assetData[type].assetTypeId || '';

  const label=document.createElement('label');
  label.className='text-sm font-medium';
  label.innerText=`Asset Type ID for "${type}"`;

  const input=document.createElement('input');
  input.className='border p-2 rounded w-full';
  input.value=assetTypeId;

  input.oninput=(e)=>{
    assetData[type].assetTypeId=e.target.value;
    renderTemplates(type);
  };

  assetTypeConfig.appendChild(label);
  assetTypeConfig.appendChild(input);
}


// ---------------- TEMPLATE RENDER ----------------

function renderTemplates(type){
  contentContainer.innerHTML='';

  const {assetTypeId,templates}=assetData[type];

  templates.forEach(template=>{

    const card=document.createElement('div');
    card.className='bg-white rounded-xl shadow p-4 flex flex-col gap-2';

    const title=document.createElement('h3');
    title.className='font-semibold text-lg';
    title.innerText=template.assetTypeTemplateName;

    const mutation=generateMutation(type,assetTypeId,template);

    const pre=document.createElement('pre');
    pre.className='text-xs bg-gray-100 p-2 rounded overflow-auto max-h-40';
    pre.innerText=mutation;

    const copyBtn=document.createElement('button');
    copyBtn.className='px-3 py-1 text-sm bg-green-600 text-white rounded';
    copyBtn.innerText='Copy Mutation';
    copyBtn.onclick=()=>navigator.clipboard.writeText(mutation);

    card.appendChild(title);
    card.appendChild(pre);
    card.appendChild(copyBtn);

    contentContainer.appendChild(card);
  });
}


// ---------------- CHECKBOX ----------------

function createCheckbox(label,checked,onChange){
  const wrapper=document.createElement('label');
  wrapper.className='flex items-center gap-2 text-sm';

  const input=document.createElement('input');
  input.type='checkbox';
  input.checked=checked;
  input.onchange=(e)=>onChange(e.target.checked);

  wrapper.appendChild(input);
  wrapper.appendChild(document.createTextNode(label));
  return wrapper;
}


// ---------------- SAFE MUTATION BUILDER ----------------

function generateMutation(assetType,assetTypeId,template){

  const pcId=pcIdInput.value || 'YOUR_PC_ID';

  const templateFields={};
  Object.keys(globalSelection.templateFields).forEach(k=>{
    if(globalSelection.templateFields[k]) templateFields[k]=template[k];
  });

  const measurements=(template.measurementTypes || []).map(m=>{
    const obj={};

    Object.keys(globalSelection.measurementFields).forEach(k=>{
      if(globalSelection.measurementFields[k]) obj[k]=m[k];
    });

    Object.keys(globalSelection.inspectionFields).forEach(k=>{
      if(globalSelection.inspectionFields[k]) obj[k]=m[k];
    });

    return obj;
  });

  return `
mutation CreateTemplate {
  createAssetTypeTemplateForPrimaryCompany(
    input: {
      primaryCompanyId: "${pcId}",
      assetTypeInputs: {
        assetType: "${assetType}",
        assetTypeId: "${assetTypeId}",
        assetTypeTemplateInputs: {
          ${Object.entries(templateFields).map(([k,v])=>`${k}: "${v}"`).join(",\n")}
          measurementTypeInputs: ${JSON.stringify(measurements,null,4)}
        }
      }
    }
  ) {
    __typename
  }
}`;
}

</script>
</body>
</html>
